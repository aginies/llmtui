name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: llm-manager-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: llm-manager-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: llm-manager-linux-aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install musl tools (musl target only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compiler
        if: contains(matrix.target, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/llm-manager ${{ matrix.name }}

      - name: Create tarball
        run: |
          tar -czf ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz ${{ matrix.name }}

      - name: Generate SHA256
        run: |
          sha256sum ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz > ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz.sha256

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz
            ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz.sha256
