name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: llm-manager-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: llm-manager-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: llm-manager-linux-aarch64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: llm-manager-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install musl tools (musl target only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compiler
        if: contains(matrix.target, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install mingw cross-compiler (Windows target)
        if: contains(matrix.target, 'windows')
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/llm-manager* ${{ matrix.name }}

      - name: Create tarball (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz ${{ matrix.name }}
          sha256sum ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz > ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz.sha256

      - name: Create zip (Windows)
        if: runner.os == 'Linux' && contains(matrix.name, 'windows')
        run: |
          zip ${{ matrix.name }}-${{ steps.version.outputs.version }}.zip ${{ matrix.name }}
          sha256sum ${{ matrix.name }}-${{ steps.version.outputs.version }}.zip > ${{ matrix.name }}-${{ steps.version.outputs.version }}.zip.sha256

      - name: Upload to release (Linux)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz
            ${{ matrix.name }}-v${{ steps.version.outputs.version }}.tar.gz.sha256

      - name: Upload to release (Windows)
        if: github.event_name == 'push' && contains(matrix.name, 'windows')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-${{ steps.version.outputs.version }}.zip
            ${{ matrix.name }}-${{ steps.version.outputs.version }}.zip.sha256
